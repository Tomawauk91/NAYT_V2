services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-certs:/etc/nginx/certs
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend/app:/app/app
      - ./backend/reports:/app/reports
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://user:password@db/pentestdb
    depends_on:
      - redis
      - db
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # Run as root inside container might be needed for some tools (nmap, etc)
    # The image runs as root by default unless specified otherwise.

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://user:password@db/pentestdb
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - redis
      - db
      - backend

  redis:
    image: redis:7-alpine

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=pentestdb
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
